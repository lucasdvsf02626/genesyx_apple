name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core-tests:
    name: GenesyxCore tests (swift test)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run domain-layer tests
        run: swift test

  app-build:
    name: Generate project & build app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build & test (Debug, simulator, no signing)
        run: |
          xcodebuild test \
            -project Genesyx.xcodeproj \
            -scheme Genesyx \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO
