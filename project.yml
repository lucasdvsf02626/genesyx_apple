# XcodeGen manifest — generates Genesyx.xcodeproj from this declarative spec, so the project
# file never needs to be hand-edited or committed in a fragile state.
#
# On your Mac:
#   brew install xcodegen
#   xcodegen generate
#   open Genesyx.xcodeproj
#
# The app target links the local GenesyxCore Swift package (pure domain logic + tests).

name: Genesyx
options:
  bundleIdPrefix: com.genesyx
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  GenesyxCore:
    path: .
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.50.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.2.0"

targets:
  Genesyx:
    type: application
    platform: iOS
    sources:
      - path: App/Genesyx
        excludes:
          - "**/*.md"
    dependencies:
      - package: GenesyxCore
        product: GenesyxCore
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
    entitlements:
      path: App/Genesyx/Genesyx.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: App/Genesyx/Info.plist
      properties:
        CFBundleDisplayName: Genesyx
        # Driven by MARKETING_VERSION / CURRENT_PROJECT_VERSION below. Without these two lines
        # xcodegen rewrites Info.plist with its defaults (1.0 / 1) on every regenerate, silently
        # undoing the shipped build number.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        # Supabase credentials (empty for local-only v1). Provide via Secrets.xcconfig or build
        # settings to activate the remote layer — see docs/SUPABASE.md.
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        # No standard/exempt encryption beyond HTTPS → skips the export-compliance prompt each upload.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Bundled fonts (drop the .ttf files into App/Genesyx/Resources/Fonts/, then
        # switch Typography.swift from .system to .custom). Missing files fall back to system.
        UIAppFonts:
          - Outfit-Regular.ttf
          - Outfit-Medium.ttf
          - Outfit-SemiBold.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
        # Deep link for partner invites (genesyx://invite/{code})
        GIDClientID: 413702980668-tfah1knspa8ip82p51c3i3veuh3ljul4.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLName: com.genesyx.app
            CFBundleURLSchemes:
              - genesyx
          - CFBundleURLName: com.genesyx.app.google
            CFBundleURLSchemes:
              - com.googleusercontent.apps.413702980668-tfah1knspa8ip82p51c3i3veuh3ljul4
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genesyx.app
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "12"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # Supabase (publishable/anon key is public — safe to ship). project epltxklawpcxxbaleswg.
        SUPABASE_URL: "https://epltxklawpcxxbaleswg.supabase.co"
        SUPABASE_ANON_KEY: "sb_publishable_eR7nEFBHD_4ATbjEeRbicA_Z3Qj_Elb"
        # SF MEDIA & PR LTD.
        DEVELOPMENT_TEAM: M5L3MM75SG
        CODE_SIGN_STYLE: Automatic
      configs:
        # Archiving signs MANUALLY with the App Store distribution profile. Automatic signing tries
        # to mint an iOS *Development* profile first and Apple refuses ("your team has no devices"),
        # which is what broke the build-9 archive. Setting it here rather than on the xcodebuild
        # command line is deliberate: a command-line setting leaks into every SPM package target
        # (GoogleSignIn, AppAuth, …), and those don't support provisioning profiles at all.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Genesyx App Store"

  GenesyxAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/GenesyxTests
    dependencies:
      - target: Genesyx
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genesyx.app.tests
        GENERATE_INFOPLIST_FILE: YES

  GenesyxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/GenesyxUITests
    dependencies:
      - target: Genesyx
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genesyx.app.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Genesyx:
    build:
      targets:
        Genesyx: all
        GenesyxAppTests: [test]
        GenesyxUITests: [test]
    test:
      targets:
        - GenesyxAppTests
        - GenesyxUITests
      gatherCoverageData: true
